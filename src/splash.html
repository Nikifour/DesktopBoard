<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desktop Board</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      body {
        display: grid;
        place-items: center;
        -webkit-user-select: none;
        user-select: none;
      }

      img {
        display: block;
        width: 220px;
        height: 220px;
        object-fit: contain;
        filter: drop-shadow(0 18px 32px rgba(0, 0, 0, 0.24));
      }
    </style>
  </head>
  <body>
    <img src="./assets/logo-animations/04_shine_transparent.gif" alt="" aria-hidden="true" />
  </body>
</html>
